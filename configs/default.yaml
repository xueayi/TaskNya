generic_webhook:
  anime_quote_enabled: true
  body: "{\n  \"content\": \"[ ${project_name} ]\\n----------------------------\\\
    n触发方式: ${method}\\n触发详情: ${detail}\\n----------------------------\\n[ 数据统计 ]\\\
    n报告统计: ${report_summary}\\n变更列表: ${report_change_list}\\n提示: ${report_actions}\\\
    n----------------------------\\n详情查看: https://xxxx.xxxx.xxxx:xxxx\\n\\n${anime_quote}\\\
    n[ 来自 XiaoXue-TaskNya 推送 ]\",\n  \"umo\": \"飘雪:GroupMessage:xxxxxxxx\",\n  \"\
    message_type\": \"text\"\n}"
  enabled: false
  headers:
    Authorization: Bearer xxxxxxxx
    Content-Type: application/json
  method: POST
  retry_count: 2
  timeout: 10
  url: http://xxxx.xxx.xxxx:10010/send
monitor:
  check_api_auth_token: ''
  check_api_enabled: false
  check_api_port: 9870
  check_directory_action_keywords:
    准备压制视频了哦(๑•̀ㅂ•́)ﻭ✧:
    - 无字幕
    压制视频已上传(◦˙▽˙◦):
    - x264
    字幕准备就绪ヾ(≧▽≦*)o:
    - 已校
    视频工程文件已上传(◦˙▽˙◦):
    - 已复制
    视频组件已上传o((^▽^))o:
    - 片头
    - 片尾
    请注意校对字幕(✿◡‿◡):
