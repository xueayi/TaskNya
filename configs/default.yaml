  check_directory_detect_added: true
  check_directory_detect_modified: false
  check_directory_detect_removed: false
  check_directory_enabled: false
  check_directory_exclude_keywords:
  - 年报
  - 测试用素材
  - 往期周报
  - 视频模板
  check_directory_include_folders: false
  check_directory_path: C:\Users\
  check_directory_recheck_delay: 20
  check_directory_report_path: ''
  check_file_detect_deletion: true
  check_file_enabled: true
  check_file_path: /tmp/test_file.txt
  check_file_recheck_delay: 0
  check_gpu_power_consecutive_checks: 3
  check_gpu_power_enabled: false
  check_gpu_power_gpu_ids: all
  check_gpu_power_threshold: 50.0
  check_gpu_power_trigger_mode: below
  check_http_body: ''
  check_http_enabled: false
  check_http_expected_keywords: []
  check_http_expected_status: 200
  check_http_headers: {}
  check_http_method: GET
  check_http_timeout: 10
  check_http_url: ''
  check_interval: 60
  check_log_enabled: true
  check_log_markers:
  - 完成
  - done
  check_log_mode: full
  check_log_path: /tmp/test.log
  logprint: 60
  project_name: 监控任务
  timeout: 0
